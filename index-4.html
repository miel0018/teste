<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

    <style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap');

:root {
    --f: -apple-system, "SF Pro Text", "SF Pro Display", "DM Sans", sans-serif;
    --bg: transparent;
    --card: rgba(0, 0, 0, 0.45);
    --bd: rgba(255, 255, 255, 0.12);
    --t: #e0e0e0;
    --td: #aaaaaa;
    --b: #ffffff;
    --dot-border: #000000;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: var(--bg);
    color: var(--t);
    font-family: var(--f);
    transition: background 0.4s ease, color 0.4s ease;
    overflow-x: hidden;
}

.gate {
    position: fixed;
    inset: 0;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 200;
}

.gate-cross {
    font-size: 52px;
    color: rgba(255, 255, 255, 0.9);
    animation: breathe 3s ease-in-out infinite;
    user-select: none;
    font-family: serif;
}

@keyframes breathe {
    0%, 100% { opacity: 0.3; transform: scale(0.96); }
    50% { opacity: 1; transform: scale(1.04); }
}

.gate.closing {
    animation: gateOut 0.85s cubic-bezier(0.76, 0, 0.24, 1) forwards;
}

@keyframes gateOut {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.05); display: none; }
}

.wrap {
    max-width: 440px;
    margin: 0 auto;
    padding: 80px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
}

.reveal.visible {
    opacity: 1;
    transform: translateY(0);
}

.card {
    background: var(--card);
    border: 1px solid var(--bd);
    border-radius: 28px;
    padding: 40px 24px 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    position: relative;
}

/* ---- avatar sozinho no hero (sem orbita) ---- */
.avatar-solo {
    display: flex;
    justify-content: center;
    margin: 15px 0 40px;
}

.avatar-ring {
    position: relative;
    width: 110px;
    height: 110px;
    z-index: 5;
}

.avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
}

.dot {
    width: 16px;
    height: 16px;
    background: #43b581;
    border: 3px solid var(--dot-border);
    border-radius: 50%;
    position: absolute;
    bottom: 4px;
    right: 4px;
}

/* ---- orbita dos amigos (usada só na seção "scroll for more") ---- */
.orbit-center {
    position: relative;
    width: 110px;
    height: 110px;
    margin: 15px auto 55px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.orbit-item {
    position: absolute;
    width: 36px;
    height: 36px;
    top: 50%;
    left: 50%;
    margin: -18px 0 0 -18px;
    animation: orbit 22s linear infinite;
    animation-delay: calc(-22s / 8 * var(--i));
    z-index: 4;
}

@keyframes orbit {
    0% { transform: rotate(0deg) translateX(95px) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(95px) rotate(-360deg); }
}

.friend {
    display: block;
    width: 100%;
    height: 100%;
    text-decoration: none;
    cursor: pointer;
}

.friend img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid var(--bd);
    transition: transform 0.2s ease, border-color 0.2s ease;
}

.friend:hover img, .friend.touched img {
    transform: scale(1.2);
    border-color: var(--b);
}

.tooltip-container {
    position: relative;
}

.tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%) translateY(4px);
    background: var(--b);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 4px solid transparent;
    border-top-color: var(--b);
}

.tooltip-container:hover .tooltip,
.friend.touched .tooltip {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

.profile-info {
    text-align: center;
    margin-bottom: 24px;
}

.profile-info h1 {
    font-size: 24px;
    font-weight: 600;
    color: var(--b);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 6px;
}

.badges {
    display: flex;
    gap: 5px;
    align-items: center;
}

.tagline {
    font-size: 14px;
    color: var(--td);
    font-weight: 400;
    min-height: 18px;
}

/* ---- efeito de digitando ---- */
.type-cursor {
    color: var(--b);
    margin-left: 1px;
    animation: blink 1s step-start infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

.social-links {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
}

.lnk {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    text-decoration: none;
    color: var(--t);
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--bd);
    border-radius: 16px;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.lnk:hover {
    background: rgba(255, 255, 255, 0.08);
    transform: translateY(-2px);
    border-color: rgba(255, 255, 255, 0.3);
    color: var(--b);
}

/* ---- widgets: spotify (lanyard) + relógio ---- */
.mini-widgets {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

.mini-card {
    flex: 1;
    min-width: 0;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--bd);
    border-radius: 16px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
}

.mini-card-empty {
    font-size: 11px;
    color: var(--td);
    text-align: center;
    width: 100%;
}

.spotify-card {
    gap: 10px;
}

.spotify-art {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
}

.spotify-info {
    min-width: 0;
    flex: 1;
}

.spotify-song {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--b);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.spotify-artist {
    font-size: 11px;
    color: var(--td);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 6px;
}

.spotify-bar {
    height: 3px;
    background: var(--bd);
    border-radius: 2px;
    overflow: hidden;
}

.spotify-bar-fill {
    height: 100%;
    width: 0%;
    background: var(--b);
    transition: width 0.5s linear;
}

.clock-card {
    flex-direction: column;
    text-align: center;
    justify-content: center;
}

.clock-time {
    font-size: 19px;
    font-weight: 600;
    color: var(--b);
    letter-spacing: 0.3px;
}

.clock-date {
    font-size: 11px;
    color: var(--td);
    margin-top: 2px;
}

.clock-you {
    font-size: 10.5px;
    color: var(--td);
    margin-top: 4px;
    opacity: 0.8;
}

.stats-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--bd);
    color: var(--b);
    font-size: 13px;
    font-weight: 600;
}

.stat {
    display: flex;
    align-items: center;
    gap: 6px;
}

.stat-divider {
    color: var(--td);
    font-weight: 300;
}

/* ---- botão "scroll for more" ---- */
.scroll-cta {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--td);
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    margin: 6px auto 2px;
    animation: bounce 2s ease-in-out infinite;
}

.scroll-cta:hover {
    color: var(--b);
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(6px); }
}

/* ---- seção dos amigos ---- */
.friends-card {
    padding: 50px 24px 60px;
    text-align: center;
}

.friends-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--td);
    margin-bottom: 10px;
}

.foot {
    text-align: center;
    font-size: 12px;
    color: var(--td);
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.video-background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
    overflow: hidden;
    pointer-events: none;
}

.video-background video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.video-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 1;
}

/* ---- oneko ---- */
#oneko {
    position: fixed;
    pointer-events: none;
    image-rendering: pixelated;
    z-index: 999999;
}

@media (max-width: 480px) {
    .wrap { padding: 60px 16px; }
    .orbit-item {
        animation: orbitMobile 22s linear infinite;
        animation-delay: calc(-22s / 8 * var(--i));
    }
    @keyframes orbitMobile {
        0% { transform: rotate(0deg) translateX(85px) rotate(0deg); }
        100% { transform: rotate(360deg) translateX(85px) rotate(-360deg); }
    }
}

</style>

function observeReveal() {
    var els = document.querySelectorAll('.reveal');
    if ('IntersectionObserver' in window) {
        var io = new IntersectionObserver(function(entries) {
            entries.forEach(function(en, i) {
                if (en.isIntersecting) {
                    setTimeout(function() { en.target.classList.add('visible'); }, i * 90);
                    io.unobserve(en.target);
                }
            });
        }, { threshold: 0.1 });
        els.forEach(function(el) { io.observe(el); });
    } else {
        els.forEach(function(el) { el.classList.add('visible'); });
    }
}

/* ---- discord status + spotify (lanyard) ---- */
var LANYARD_ID = '1239726174511300648';
var currentSpotify = null;

function fetchDiscordStatus() {
    fetch('https://api.lanyard.rest/v1/users/' + LANYARD_ID)
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (!d || !d.data) return;

            var dot = document.getElementById('dot');
            var map = { online: '#43b581', dnd: '#f04747', idle: '#faa61a', offline: '#747f8d' };
            var status = d.data.discord_status || 'offline';
            if (dot) dot.style.backgroundColor = map[status] || '#ccc';

            var widget = document.getElementById('spotify-widget');
            if (!widget) return;

            if (d.data.listening_to_spotify && d.data.spotify) {
                var s = d.data.spotify;
                currentSpotify = s;
                widget.innerHTML =
                    '<img class="spotify-art" src="' + s.album_art_url + '" alt="album art">' +
                    '<div class="spotify-info">' +
                        '<div class="spotify-song">' + s.song + '</div>' +
                        '<div class="spotify-artist">' + s.artist + '</div>' +
                        '<div class="spotify-bar"><div class="spotify-bar-fill" id="spotify-bar-fill"></div></div>' +
                    '</div>';
            } else {
                currentSpotify = null;
                widget.innerHTML = '<div class="mini-card-empty">não tô ouvindo nada agora</div>';
            }
        })
        .catch(function() {});
}

function updateSpotifyBar() {
    if (!currentSpotify || !currentSpotify.timestamps) return;
    var fill = document.getElementById('spotify-bar-fill');
    if (!fill) return;
    var now = Date.now();
    var start = currentSpotify.timestamps.start;
    var end = currentSpotify.timestamps.end;
    var pct = Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
    fill.style.width = pct + '%';
}

/* ---- relógio ---- */
var OWNER_OFFSET_MINUTES = -180; // horário de Brasília (BRT, UTC-3)

function updateClock() {
    var now = new Date();
    var ownerTime = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));

    var hh = String(ownerTime.getHours()).padStart(2, '0');
    var mm = String(ownerTime.getMinutes()).padStart(2, '0');
    var ss = String(ownerTime.getSeconds()).padStart(2, '0');
    var timeEl = document.getElementById('clock-time');
    if (timeEl) timeEl.textContent = hh + ':' + mm + ':' + ss;

    var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    var dateEl = document.getElementById('clock-date');
    if (dateEl) dateEl.textContent = days[ownerTime.getDay()] + ', ' + months[ownerTime.getMonth()] + ' ' + ownerTime.getDate() + ' · BRT';

    var visitorOffsetMinutes = -now.getTimezoneOffset();
    var diffHours = Math.round((visitorOffsetMinutes - OWNER_OFFSET_MINUTES) / 60);
    var sign = diffHours > 0 ? '+' : '';
    var vh = String(now.getHours()).padStart(2, '0');
    var vm = String(now.getMinutes()).padStart(2, '0');
    var youEl = document.getElementById('clock-you');
    if (youEl) youEl.textContent = 'seu horário: ' + vh + ':' + vm + ' (' + sign + diffHours + 'h)';
}

/* ---- efeito de digitando ---- */
function typewriterEffect(el, text, speed) {
    if (!el) return;
    var i = 0;
    function type() {
        if (i <= text.length) {
            el.textContent = text.slice(0, i);
            i++;
            setTimeout(type, speed);
        }
    }
    type();
}

function lastUpdated() {
    var el = document.getElementById('last-updated');
    if (!el) return;
    var d = new Date(document.lastModified);
    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    el.innerText = 'last updated ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

/* ---- oneko: gatinho que persegue o cursor ---- */
(function() {
    var nekoEl = document.getElementById('oneko');
    if (!nekoEl) return;
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    var nekoSpriteUrl = 'https://cdn.jsdelivr.net/gh/adryd325/oneko.js@master/oneko.gif';
    var nekoSpeed = 10;
    var nekoPosX = 32, nekoPosY = 32;
    var mousePosX = 0, mousePosY = 0;
    var frameCount = 0;
    var idleTime = 0;
    var idleAnimation = null;
    var idleAnimationFrame = 0;

    var spriteSets = {
        idle: [[-3, -3]],
        alert: [[-7, -3]],
        scratchSelf: [[-5, 0], [-6, 0], [-7, 0]],
        tired: [[-3, -2]],
        sleeping: [[-2, 0], [-2, -1]],
        N: [[-1, -2], [-1, -3]],
        NE: [[0, -2], [0, -3]],
        E: [[-3, 0], [-3, -1]],
        SE: [[-5, -1], [-5, -2]],
        S: [[-6, -3], [-7, -2]],
        SW: [[-5, -3], [-6, -1]],
        W: [[-4, -2], [-4, -3]],
        NW: [[-1, 0], [-1, -1]]
    };

    function setSprite(name, frame) {
        var set = spriteSets[name] || spriteSets.idle;
        var sprite = set[frame % set.length];
        nekoEl.style.backgroundPosition = (sprite[0] * 32) + 'px ' + (sprite[1] * 32) + 'px';
    }

    function resetIdleAnimation() {
        idleAnimation = null;
        idleAnimationFrame = 0;
    }

    function idle() {
        idleTime += 1;
        if (idleTime > 10 && Math.floor(Math.random() * 200) === 0 && idleAnimation === null) {
            idleAnimation = ['sleeping', 'scratchSelf'][Math.floor(Math.random() * 2)];
        }
        switch (idleAnimation) {
            case 'sleeping':
                if (idleAnimationFrame < 8) { setSprite('tired', 0); break; }
                setSprite('sleeping', Math.floor(idleAnimationFrame / 4));
                if (idleAnimationFrame > 192) resetIdleAnimation();
                break;
            case 'scratchSelf':
                setSprite('scratchSelf', idleAnimationFrame);
                if (idleAnimationFrame > 9) resetIdleAnimation();
                break;
            default:
                setSprite('idle', 0);
                return;
        }
        idleAnimationFrame += 1;
    }

    function frame() {
        frameCount += 1;
        var diffX = nekoPosX - mousePosX;
        var diffY = nekoPosY - mousePosY;
        var distance = Math.sqrt(diffX * diffX + diffY * diffY);

        if (distance < nekoSpeed || distance < 48) {
            idle();
            return;
        }

        idleAnimation = null;
        idleAnimationFrame = 0;

        if (idleTime > 1) {
            setSprite('alert', 0);
            idleTime = Math.min(idleTime, 7);
            idleTime -= 1;
            return;
        }

        var direction = diffY / distance > 0.5 ? 'N' : '';
        direction += diffY / distance < -0.5 ? 'S' : '';
        direction += diffX / distance > 0.5 ? 'W' : '';
        direction += diffX / distance < -0.5 ? 'E' : '';
        setSprite(direction, frameCount);

        nekoPosX -= (diffX / distance) * nekoSpeed;
        nekoPosY -= (diffY / distance) * nekoSpeed;
        nekoPosX = Math.min(Math.max(16, nekoPosX), window.innerWidth - 16);
        nekoPosY = Math.min(Math.max(16, nekoPosY), window.innerHeight - 16);

        nekoEl.style.left = (nekoPosX - 16) + 'px';
        nekoEl.style.top = (nekoPosY - 16) + 'px';
    }

    var lastFrameTimestamp;
    function onAnimationFrame(timestamp) {
        if (!lastFrameTimestamp) lastFrameTimestamp = timestamp;
        if (timestamp - lastFrameTimestamp > 100) {
            lastFrameTimestamp = timestamp;
            frame();
        }
        window.requestAnimationFrame(onAnimationFrame);
    }

    nekoEl.style.width = '32px';
    nekoEl.style.height = '32px';
    nekoEl.style.left = '16px';
    nekoEl.style.top = '16px';
    nekoEl.style.backgroundImage = 'url(' + nekoSpriteUrl + ')';

    document.addEventListener('mousemove', function(event) {
        mousePosX = event.clientX;
        mousePosY = event.clientY;
    });

    window.requestAnimationFrame(onAnimationFrame);
})();

fetchDiscordStatus();

updateClock();
setInterval(updateClock, 1000);

typewriterEffect(document.getElementById('typewriter'), 'A negative mind will never give you a positive life.', 45);

lastUpdated();

}
